# CacaoDocs Configuration
title: "CacaoDocs"
description: "Generate beautiful documentation from Python docstrings"
version: "2.0.0"
footer_text: "Built with CacaoDocs"
github_url: "https://github.com/jhd3197/CacaoDocs"

# Optional: Analytics
# google_analytics_id: "G-XXXXXXXXXX"
# clarity_id: "xxxxxxxxxx"

# Logo configuration (optional)
# logo_url: "/path/to/logo.png"

# Theme Settings
theme:
  # General configuration
  primary_color: "#8B4513"                      # Saddle Brown
  secondary_color: "#D2691E"                    # Chocolate
  bg_color: "#faf8f5"                           # Creamy White
  text_color: "#1a202c"                         # Dark Text
  highlight_code_bg_color: "#fff8f0"            # Light Cream
  highlight_code_border_color: "#8B4513"        # Saddle Brown

  # Navigation bar configuration
  sidebar_bg_color: "#ffffff"                   # White
  sidebar_text_color: "#1a202c"                 # Dark Text
  sidebar_highlight_bg_color: "#8B4513"         # Saddle Brown
  sidebar_highlight_text_color: "#ffffff"       # White
  secondary_sidebar_bg_color: "#f5f0eb"         # Light Beige
  secondary_sidebar_text_color: "#1a202c"       # Dark Text
  secondary_sidebar_highlight_bg_color: "#8B4513" # Saddle Brown
  secondary_sidebar_highlight_text_color: "#ffffff" # White

  # Home page configuration
  home_page_welcome_bg_1: "#8B4513"             # Saddle Brown
  home_page_welcome_bg_2: "#D2691E"             # Chocolate
  home_page_welcome_text_color: "#ffffff"       # White
  home_page_card_bg_color: "#ffffff"            # White
  home_page_card_text_color: "#1a202c"          # Dark Text

  # Code configuration
  code_bg_color: "#f5f0eb"                      # Light Beige

# Patterns to exclude from scanning
exclude_patterns:
  - "__pycache__"
  - ".venv"
  - "venv"
  - ".git"
  - "node_modules"
  - "build"
  - "dist"
  - "*.egg-info"
